<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — QIU Lost & Found</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
        </div>
        <h1>QIU Lost &amp; Found</h1>
        <p>Quest International University</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="showTab('login')">Sign In</button>
        <button class="auth-tab"        id="tab-register" onclick="showTab('register')">Create Account</button>
      </div>

      <!-- ── LOGIN FORM ────────────────────────────── -->
      <div id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="student@qiu.edu.my" autocomplete="off" />
          <div class="form-error" id="login-email-err"></div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="new-password" />
          <div class="form-error" id="login-password-err"></div>
        </div>
        <div class="form-error" id="login-general-err" style="margin-bottom:.75rem"></div>
        <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In</button>
        <p style="text-align:center;margin-top:1rem;font-size:.85rem;color:var(--muted)">
          No account? <a href="#" onclick="showTab('register')">Register here</a>
        </p>
      </div>

      <!-- ── REGISTER FORM ─────────────────────────── -->
      <div id="register-form" style="display:none">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Ahmad bin Ali" autocomplete="name" />
          <div class="form-error" id="reg-name-err"></div>
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" placeholder="student@qiu.edu.my" autocomplete="email" />
          <div class="form-error" id="reg-email-err"></div>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Minimum 6 characters" autocomplete="new-password" />
          <div class="form-hint">At least 8 characters with one uppercase letter and one number.</div>
          <div class="form-error" id="reg-password-err"></div>
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Re-enter password" autocomplete="new-password" />
          <div class="form-error" id="reg-confirm-err"></div>
        </div>
        <div class="form-error" id="reg-general-err" style="margin-bottom:.75rem"></div>
        <button class="btn btn-primary btn-full" id="reg-btn" onclick="doRegister()">Create Account</button>
        <p style="text-align:center;margin-top:1rem;font-size:.85rem;color:var(--muted)">
          Already have an account? <a href="#" onclick="showTab('login')">Sign in</a>
        </p>
      </div>

    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    Auth.redirectIfLoggedIn();

    function showTab(tab) {
      document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
      document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    function clearErrors(prefix) {
      ['email','password','name','confirm','general'].forEach(f => {
        const el = document.getElementById(`${prefix}-${f}-err`) ||
                   document.getElementById(`${prefix}-general-err`);
        if (el) el.textContent = '';
      });
      document.querySelectorAll('.field-error').forEach(e => e.classList.remove('field-error'));
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      if (el) el.textContent = msg;
    }

    // ── CLIENT-SIDE VALIDATION (matches server rules) ──────
    function validateLogin() {
      let ok = true;
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('login-email-err', 'Enter a valid email address.');
        document.getElementById('login-email').classList.add('field-error');
        ok = false;
      }
      if (!pass) {
        showError('login-password-err', 'Password is required.');
        document.getElementById('login-password').classList.add('field-error');
        ok = false;
      }
      return ok;
    }

    function validateRegister() {
      let ok = true;
      const name    = document.getElementById('reg-name').value.trim();
      const email   = document.getElementById('reg-email').value.trim();
      const pass    = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (!name) {
        showError('reg-name-err', 'Full name is required.'); ok = false;
        document.getElementById('reg-name').classList.add('field-error');
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('reg-email-err', 'Enter a valid email address.'); ok = false;
        document.getElementById('reg-email').classList.add('field-error');
      }
      if (pass.length < 8 || !/[A-Z]/.test(pass) || !/[0-9]/.test(pass)) {
        showError('reg-password-err', 'Password must be at least 6 characters'); ok = false;
        document.getElementById('reg-password').classList.add('field-error');
      }
      if (pass !== confirm) {
        showError('reg-confirm-err', 'Passwords do not match.'); ok = false;
        document.getElementById('reg-confirm').classList.add('field-error');
      }
      return ok;
    }

    async function doLogin() {
      clearErrors('login');
      if (!validateLogin()) return;

      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in…'; btn.disabled = true;

      const res = await API.post('/auth/login', {
        email:    document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value
      });

      btn.textContent = 'Sign In'; btn.disabled = false;

      if (res.ok) {
        Auth.save(res.data.token, res.data.user);
        window.location.href = '/home.html';
      } else {
        const msg = res.data.errors
          ? res.data.errors.map(e => e.msg).join(' ')
          : res.data.message;
        showError('login-general-err', msg);
      }
    }

    async function doRegister() {
      clearErrors('reg');
      if (!validateRegister()) return;

      const btn = document.getElementById('reg-btn');
      btn.textContent = 'Creating…'; btn.disabled = true;

      const res = await API.post('/auth/register', {
        name:     document.getElementById('reg-name').value.trim(),
        email:    document.getElementById('reg-email').value.trim(),
        password: document.getElementById('reg-password').value
      });

      btn.textContent = 'Create Account'; btn.disabled = false;

      if (res.ok) {
        Auth.save(res.data.token, res.data.user);
        window.location.href = '/home.html';
      } else {
        const msg = res.data.errors
          ? res.data.errors.map(e => e.msg).join(' ')
          : res.data.message;
        showError('reg-general-err', msg);
      }
    }

    // Submit on Enter key
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const loginVisible = document.getElementById('login-form').style.display !== 'none';
      if (loginVisible) doLogin(); else doRegister();
    });
  </script>
</body>
</html>
